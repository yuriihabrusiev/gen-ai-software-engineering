[tools]
python = "3.14"
uv = "latest"

[env]
ADMIN_API_KEY = "dev-local-admin-key-000"

[tasks.setup]
description = "Install project dependencies"
run = "uv sync"

[tasks.dev]
description = "Run the FastAPI development server"
run = "uv run fastapi dev src/task_tracker_api/main.py"

[tasks.lint]
description = "Run Ruff lint checks"
run = "uv run ruff check ."

[tasks."lint:fix"]
description = "Run Ruff and apply safe fixes"
run = "uv run ruff check --fix ."

[tasks.typecheck]
description = "Run ty type checks"
run = "uv run ty check"

[tasks.test]
description = "Run the pytest suite"
run = "uv run pytest"

[tasks.check]
description = "Run lint and type checks"
run = "mise run lint && mise run typecheck"
