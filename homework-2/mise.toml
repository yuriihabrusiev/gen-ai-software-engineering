[tools]
uv = "latest"
python = "3.14"

[tasks.dev]
description = "Start the development server with hot reload"
run = "uv run uvicorn src.main:app --reload"

[tasks.lint]
description = "Check code with ruff (lint + format) and ty"
run = [
  "uv run ruff check src/ tests/",
  "uv run ruff format --check src/ tests/",
  "uv run ty check src/ tests/",
]

[tasks."lint:fix"]
description = "Auto-fix lint issues, apply formatting, and type-check"
run = [
  "uv run ruff check src/ tests/ --fix",
  "uv run ruff format src/ tests/",
  "uv run ty check src/ tests/",
]

[tasks.test]
description = "Run the pytest suite"
run = "uv run pytest"

[tasks."test:cov"]
description = "Run tests with coverage and enforce the assignment threshold"
run = "uv run pytest --cov=src --cov-report=term-missing --cov-fail-under=85"
