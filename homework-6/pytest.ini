[pytest]
# Ensures the repo root (where orchestrator.py and the pipeline/ and mcp/
# packages live) is importable regardless of whether pytest is invoked as
# `pytest` or `python -m pytest`, and regardless of the caller's cwd — the
# coverage-gate hook (.claude/hooks/check-coverage.sh) and CI both invoke the
# plain `pytest` console script, which does not add cwd to sys.path on its
# own the way `python -m pytest` does.
pythonpath = .
testpaths = tests
